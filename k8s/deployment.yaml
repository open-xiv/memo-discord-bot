# memo-discord-bot — singleton. discordgo holds one gateway connection
# per token, so two replicas would race / get rate-limited.
#
# Image is rolled by the build-and-deploy workflow; the tag below is just
# the bootstrap value applied via `kubectl apply` for first install.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: memo-discord-bot
  namespace: memo
  labels:
    app: memo-discord-bot
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: memo-discord-bot
  template:
    metadata:
      labels:
        app: memo-discord-bot
    spec:
      containers:
        - name: app
          image: ghcr.io/open-xiv/memo-discord-bot:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: GIN_MODE
              value: release
            - name: LOG_LEVEL
              value: info
          envFrom:
            - secretRef:
                name: memo-bot-env
          readinessProbe:
            httpGet:
              path: /status
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /status
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: 30m
              memory: 64Mi
            limits:
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: memo-discord-bot
  namespace: memo
  labels:
    app: memo-discord-bot
spec:
  type: ClusterIP
  selector:
    app: memo-discord-bot
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
# Picked up by kube-prometheus-stack via release=kube-prom selector.
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: memo-discord-bot
  namespace: memo
  labels:
    release: kube-prom
spec:
  selector:
    matchLabels:
      app: memo-discord-bot
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
---
# Public ingress for inbound webhooks (/webhook/gha, /webhook/github).
# /, /status, /metrics are also reachable but Prometheus scrapes the
# in-cluster Service directly so external GET noise stays low.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: memo-discord-bot
  namespace: memo
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.tls: "true"
spec:
  ingressClassName: traefik
  rules:
    - host: bot.sumemo.dev
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: memo-discord-bot
                port:
                  number: 8080
  tls:
    - hosts:
        - bot.sumemo.dev
      secretName: wildcard-sumemo-dev-tls
