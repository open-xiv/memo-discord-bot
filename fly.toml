app = 'memo-discord-bot-silent-mountain-1575'
primary_region = 'nrt'

[build]

[env]
  LOG_LEVEL = 'info'
  PORT = '8080'

[http_service]
  internal_port = 8080
  force_https = true
  # Discord bot opens a persistent WebSocket gateway connection (see
  # bot/bot.go discordgo.Session.Open). Slash commands arrive over that
  # gateway, NOT over HTTP — so fly's auto-stop / auto-start (driven by
  # HTTP traffic) would just disconnect the bot. Also: a single bot token
  # can hold only ONE gateway connection at a time; running 2 machines
  # makes them race and Discord drops the older session. Keep at exactly
  # 1 machine, always on.
  auto_stop_machines = 'off'
  auto_start_machines = false
  min_machines_running = 0
  processes = ['app']

[deploy]
  strategy = 'immediate'

[[vm]]
  size = 'shared-cpu-1x'
